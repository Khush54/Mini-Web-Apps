<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Password generator to generate passwords randomly.">
    <title>Password Generator</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        body {
            background-color: whitesmoke;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: burlywood;
            color: rgb(120, 25, 25);
            width: 20em;
            text-align: center;
            padding: 20px;
            border: 3px solid rgb(238, 182, 109);
            border-radius: 5px;
        }

        .box {
            justify-self: center;
            margin: 5px;
            padding: 5px;
        }

        #password {
            width: 200px;
            height: 20px;
            border: 2px solid rgb(235, 186, 122);
            border-radius: 5px;
            outline: 1px solid white;
            margin-top: 25px;
            font-size: 16px;
        }

        #copy {
            width: 70px;
            height: 25px;
            border: 2px solid rgb(235, 186, 122);
            border-radius: 5px;
            outline: 1px solid white;
            font-size: 16px;
            background-color: whitesmoke;
        }

        input {
            width: 40px;
            height: 20px;
            border: 2px solid rgb(235, 186, 122);
            border-radius: 5px;
            outline: 1px solid white;
            margin-top: 10px;
            font-size: 14px;
        }

        label {
            font-size: 15px;
            font-weight: 500;
        }

        #generate {
            width: 100px;
            height: 25px;
            border: 2px solid rgb(235, 186, 122);
            border-radius: 5px;
            outline: 1px solid white;
            font-size: 16px;
            margin: 10px;
            background-color: whitesmoke;
        }

        @media (max-width:400px) {
            .container {
                width: 12em;
            }

            #password {
                width: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Password Generator</h1>
            <input type="text" id="password">
            <button onclick="copy()" id="copy">Copy</button>
            <div>
                <label for="num">Length Of Numbers : </label>
                <input type="text" name="number" id="number">
            </div>
            <div>
                <label for="letter">Length Of Alphabet : </label>
                <input type="text" name="letters" id="letters">
            </div>
            <div>
                <label for="spcl">Length Of Special Characters : </label>
                <input type="text" name="character" id="character">
            </div>
            <button id="generate" onclick="genpasswords()">Generate</button>
        </div>
    </div>
    <script>
        function genpasswords() {
            let num = document.getElementById("number").value;
            let letter = document.getElementById("letters").value;
            let char = document.getElementById("character").value;
            const alphabets = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
            const digits = "0123456789"
            const spcl_char = "!@#$%^&*()_+{}[]|<>?/"
            let pass = ""
            for (let i = 0; i < num; i++) {
                pass += digits[Math.floor(Math.random() * digits.length)]
            }
            for (let i = 0; i < letter; i++) {
                pass += alphabets[Math.floor(Math.random() * alphabets.length)]
            }
            for (let i = 0; i < char; i++) {
                pass += spcl_char[Math.floor(Math.random() * spcl_char.length)]
            }

            pass = pass.split('').sort(() => Math.random() - 0.5).join('');
            document.getElementById('password').value = pass
        }
   
        function copy(){
            password =  document.getElementById('password');
            password.select();
            document.execCommand("copy")
            alert("Copied")
        }
    </script>
</body>
</html>
